<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التمريض</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#0b6efd;
color:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
font-size:28px;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-size:18px;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:45px;
color:#0b6efd;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#555;
margin-bottom:30px;
}

button{
background:#0b6efd;
color:white;
border:none;
padding:15px 35px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:50px 20px;
}

.card{
background:white;
width:280px;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

.card h3{
margin-bottom:15px;
color:#0b6efd;
}

footer{
margin-top:60px;
background:#0b6efd;
color:white;
padding:20px;
text-align:center;
}
</style>

</head>

<body>

<header>
<h2>🩺 بوابة التمريض</h2>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الكورسات</a>
<a href="#">الاختبارات</a>
<a href="#">تواصل معنا</a>
</nav>

</header>

<section class="hero">

<h1>مرحبًا بك في بوابة التمريض</h1>

<p>
تعلم... اختبر نفسك... وحقق أعلى الدرجات.
</p>

<button>ابدأ الآن</button>

</section>

<section class="cards">

<div class="card">
<h3>📚 الكورسات</h3>
<p>شرح جميع مواد التمريض.</p>
</div>

<div class="card">
<h3>📝 الاختبارات</h3>
<p>اختبارات إلكترونية مع النتيجة.</p>
</div>

<div class="card">
<h3>📄 الملفات</h3>
<p>ملخصات وملفات PDF.</p>
</div>

</section>

<footer>

جميع الحقوق محفوظة © بوابة التمريض 2026

</footer>

</body>
</html>
